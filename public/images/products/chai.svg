<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chai Tea - teacup with saucer cartoon style -->
  <ellipse cx="100" cy="178" rx="72" ry="12" fill="#7A9A6A" opacity="0.1"/>
  <ellipse cx="100" cy="175" rx="68" ry="10" fill="#F5E6CC" stroke="#2A1810" stroke-width="2.5"/>
  
  <!-- Wide teacup body -->
  <path d="M48 115 L58 168 C58 174 142 174 142 168 L152 115" fill="#F5E6CC" stroke="#2A1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Decorative band on cup -->
  <path d="M52 130 L148 130" stroke="#7A9A6A" stroke-width="3" opacity="0.4"/>
  <path d="M54 138 L146 138" stroke="#7A9A6A" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Cup rim -->
  <ellipse cx="100" cy="115" rx="53" ry="13" fill="#F5E6CC" stroke="#2A1810" stroke-width="2.5"/>
  <!-- Tea liquid -->
  <ellipse cx="100" cy="117" rx="46" ry="10" fill="#C45D3E" opacity="0.6"/>
  
  <!-- Spice garnish -->
  <!-- Cinnamon stick -->
  <rect x="85" y="108" width="35" height="4" rx="2" fill="#8B5A3A" stroke="#2A1810" stroke-width="1" transform="rotate(-15 102 110)"/>
  <!-- Star anise -->
  <text x="115" y="118" font-size="10" opacity="0.6">✦</text>
  
  <!-- Handle -->
  <path d="M152 122 C172 122 177 142 168 155 C160 165 148 162 143 155" stroke="#2A1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Cute face -->
  <ellipse cx="85" cy="148" rx="6" ry="7" fill="#2A1810"/>
  <ellipse cx="115" cy="148" rx="6" ry="7" fill="#2A1810"/>
  <ellipse cx="87" cy="145" rx="3" ry="3" fill="white" opacity="0.8"/>
  <ellipse cx="117" cy="145" rx="3" ry="3" fill="white" opacity="0.8"/>
  <!-- Contented closed-eye smile -->
  <path d="M87 160 Q100 170 113 160" stroke="#2A1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="73" cy="155" rx="8" ry="5" fill="#C45D3E" opacity="0.15"/>
  <ellipse cx="127" cy="155" rx="8" ry="5" fill="#C45D3E" opacity="0.15"/>
  
  <!-- Aromatic steam (more swirly for tea) -->
  <path d="M80 100 Q88 85 80 70 Q72 55 80 42" stroke="#7A9A6A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M100 97 Q108 80 100 65 Q92 50 100 37" stroke="#7A9A6A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M120 100 Q128 85 120 70 Q112 55 120 42" stroke="#7A9A6A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.06;0.25" dur="3.5s" repeatCount="indefinite"/>
  </path>
</svg>
