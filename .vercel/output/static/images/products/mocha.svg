<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mocha cup - chocolate themed -->
  <ellipse cx="100" cy="175" rx="70" ry="12" fill="#D4922A" opacity="0.12"/>
  <ellipse cx="100" cy="172" rx="65" ry="10" fill="#F5E6CC" stroke="#2A1810" stroke-width="2.5"/>
  
  <!-- Cup body - darker/chocolate colored -->
  <path d="M55 105 L63 162 C63 170 137 170 137 162 L145 105" fill="#4A2820" stroke="#2A1810" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="100" cy="105" rx="46" ry="12" fill="#4A2820" stroke="#2A1810" stroke-width="2.5"/>
  
  <!-- Whipped cream top -->
  <ellipse cx="100" cy="100" rx="38" ry="12" fill="white" stroke="#2A1810" stroke-width="1.5"/>
  <ellipse cx="90" cy="95" rx="15" ry="10" fill="white" stroke="#F0E4D0" stroke-width="1"/>
  <ellipse cx="112" cy="93" rx="14" ry="11" fill="white" stroke="#F0E4D0" stroke-width="1"/>
  <ellipse cx="100" cy="88" rx="12" ry="9" fill="white" stroke="#F0E4D0" stroke-width="1"/>
  
  <!-- Chocolate drizzle -->
  <path d="M80 98 Q82 105 80 112" stroke="#3D1F0E" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M120 97 Q122 108 118 115" stroke="#3D1F0E" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M95 100 Q96 106 94 110" stroke="#3D1F0E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Handle -->
  <path d="M145 115 C165 115 168 135 160 148 C153 158 142 155 138 148" stroke="#2A1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Cute face (on the dark cup — lighter colors) -->
  <ellipse cx="85" cy="138" rx="5" ry="7" fill="#FDF6EC"/>
  <ellipse cx="115" cy="138" rx="5" ry="7" fill="#FDF6EC"/>
  <ellipse cx="87" cy="135" rx="2.5" ry="3" fill="#4A2820" opacity="0.4"/>
  <circle cx="85" cy="138" r="2.5" fill="#2A1810"/>
  <circle cx="115" cy="138" r="2.5" fill="#2A1810"/>
  <path d="M88 153 Q100 163 112 153" stroke="#FDF6EC" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="75" cy="148" rx="7" ry="4" fill="#E8B04A" opacity="0.2"/>
  <ellipse cx="125" cy="148" rx="7" ry="4" fill="#E8B04A" opacity="0.2"/>

  <!-- Chocolate shavings on cream -->
  <rect x="92" y="85" width="3" height="3" rx="0.5" fill="#3D1F0E" opacity="0.4" transform="rotate(15 93 86)"/>
  <rect x="105" y="87" width="2.5" height="2.5" rx="0.5" fill="#3D1F0E" opacity="0.35" transform="rotate(-10 106 88)"/>
  <rect x="98" y="82" width="2" height="2" rx="0.5" fill="#3D1F0E" opacity="0.3" transform="rotate(30 99 83)"/>
