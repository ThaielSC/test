<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Latte - tall glass cartoon style -->
  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="45" ry="8" fill="#D4922A" opacity="0.1"/>
  
  <!-- Glass body -->
  <path d="M70 60 L75 178 C75 184 125 184 125 178 L130 60" fill="#FDF6EC" stroke="#2A1810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glass rim -->
  <ellipse cx="100" cy="60" rx="31" ry="8" fill="#FDF6EC" stroke="#2A1810" stroke-width="2.5"/>
  
  <!-- Milk layers -->
  <rect x="76" y="100" width="48" height="75" rx="2" fill="#F5E6CC" opacity="0.6"/>
  <rect x="76" y="80" width="48" height="30" rx="2" fill="#D4A574" opacity="0.4"/>
  <!-- Coffee layer -->
  <ellipse cx="100" cy="62" rx="26" ry="6" fill="#6B3A2A"/>
  <!-- Foam -->
  <ellipse cx="100" cy="63" rx="20" ry="4" fill="white" opacity="0.4"/>
  
  <!-- Latte art heart -->
  <path d="M95 67 Q92 63 95 61 Q98 59 100 62 Q102 59 105 61 Q108 63 105 67 L100 72 Z" fill="#F5E6CC" opacity="0.7"/>
  
  <!-- Cute face -->
  <ellipse cx="90" cy="130" rx="5" ry="7" fill="#2A1810"/>
  <ellipse cx="110" cy="130" rx="5" ry="7" fill="#2A1810"/>
  <ellipse cx="92" cy="127" rx="2.5" ry="3" fill="white" opacity="0.8"/>
  <ellipse cx="112" cy="127" rx="2.5" ry="3" fill="white" opacity="0.8"/>
  <path d="M90 144 Q100 154 110 144" stroke="#2A1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="138" rx="7" ry="5" fill="#E8B04A" opacity="0.2"/>
  <ellipse cx="120" cy="138" rx="7" ry="5" fill="#E8B04A" opacity="0.2"/>
  
  <!-- Steam -->
  <path d="M90 48 Q95 35 90 25" stroke="#D4922A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M110 48 Q115 35 110 25" stroke="#D4922A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.08;0.25" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>
